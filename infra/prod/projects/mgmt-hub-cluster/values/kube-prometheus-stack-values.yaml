# ============================================================================
# Grafana 설정
# ============================================================================
grafana:
  adminPassword: "Q******77"  # 배포 후 변경 권장

  # Ingress 설정 (ALB IngressGroup 사용 - 그룹 참여만)
  ingress:
    # enabled: false
    enabled: true
    ingressClassName: alb
    annotations:
        # --- [공통] ALB 그룹 설정 ---
      alb.ingress.kubernetes.io/group.name: "prod-mgmt-hub"
      alb.ingress.kubernetes.io/group.order: "800"
      # --- [공통] ALB 내부설정 설정 ---
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}, {"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      # --- [개별] ALB 개별 설정 ---
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:******-d053338fc8b8
      alb.ingress.kubernetes.io/healthcheck-path: "/api/health"
    hosts:
      - mgmt-hub.nextpay.co.kr
    path: /metric
    pathType: Prefix
  
  # 프로메테우스그라파나스텍 차트의 경로
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/metric"
      serve_from_sub_path: true

  # 스토리지 비활성화 (prod 환경)
  persistence:
    enabled: false

# ============================================================================
# Prometheus 설정
# ============================================================================
prometheus:
  # Ingress 설정 (ALB IngressGroup 사용)
  ingress:
    enabled: false
    # enabled: true
    # ingressClassName: alb
    # annotations:
    #   alb.ingress.kubernetes.io/group.name: "main-prod-cms-alb"
    #   alb.ingress.kubernetes.io/group.order: "210"
    #   alb.ingress.kubernetes.io/target-type: ip
    # hosts:
    #   - prometheus.nextpay.co.kr
    # paths:
    #   - /

  prometheusSpec:
    # 메트릭 보관 기간 (prod 환경)
    retention: 7d

    # 스토리지 비활성화 (emptyDir 사용)
    storageSpec: {}

